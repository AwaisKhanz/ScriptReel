[project]
name = "scriptreel-ml"
version = "0.0.0"
description = "ScriptReel ML sidecar — model inference only (TTS, embeddings, alignment, text cards)."
requires-python = "==3.12.*"
dependencies = [
  "fastapi>=0.115",
  "uvicorn[standard]>=0.34",
  "torch>=2.5",
  "torchvision>=0.20", # DINOv2 AutoImageProcessor (doc 25 §6) needs it
  "transformers>=4.48",
  "mlx>=0.21",
  "mlx-whisper>=0.4",
  "kokoro>=0.9",
  "misaki[en]>=0.9",
  "soundfile>=0.12",
  "pillow>=11",
  "pytesseract>=0.3.13",
  "insightface>=0.7",
  "onnxruntime>=1.19",
  "numpy<2",
  "huggingface-hub>=0.27",
]

[dependency-groups]
dev = [
  "pytest>=8",
  "httpx>=0.27",
]

[tool.uv]
package = false

[tool.pytest.ini_options]
pythonpath = ["."]
testpaths = ["tests"]
